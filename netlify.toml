[build]
  publish = "public"
  functions = "netlify/functions"
  # Extract the committed HVSC archive (hvsc-data/*.7z) into public/HVSC/ so the
  # raw .sid files are served statically, then generate the per-composer SEO
  # pages + sitemap from the committed index. (The index itself is committed and
  # does not need rebuilding here.)
  command = "npm install && npm run build"

# Short cache for font and bar-style assets so new additions appear quickly
[[headers]]
  for = "/PNG/Fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
  for = "/PNG/BarStyles/*"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Short cache for JS files to pick up code changes quickly
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# JSON configs also need short cache
[[headers]]
  for = "/prg/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300, must-revalidate"

# Keep the raw HVSC mirror and its index out of search indexes: results should
# point at SIDquake pages, not raw .sid download links.
[[headers]]
  for = "/HVSC/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"

[[headers]]
  for = "/hvsc-index.json"
  [headers.values]
    X-Robots-Tag = "noindex"

# The embed is meant to be iframed from SIDquake pages, not indexed on its own.
[[headers]]
  for = "/hvsc-embed.html"
  [headers.values]
    X-Robots-Tag = "noindex"
